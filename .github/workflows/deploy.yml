# Build the ContSys Hospital and deploy it to GitHub Pages.
# Every push to main rebuilds the world from data/*.json (pipeline + audits)
# and publishes dist/ — a fresh model export only needs committing.
name: Deploy hospital

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build # world pipeline + audits + vite build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      # Pages intermittently answers "Deployment failed, try again later";
      # a second attempt has always landed it
      - if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
