<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContSys Hospital</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1a1a;
        font-family: Arial, Helvetica, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        color: #fff;
      }
      #area-sign {
        position: absolute;
        top: 16px;
        left: 16px;
        background: #005eb8;
        color: #fff;
        padding: 10px 18px;
        font-size: 18px;
        border-radius: 4px;
        min-width: 200px;
      }
      #area-sign .room {
        font-size: 12px;
        opacity: 0.85;
      }
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.7);
      }
      #toast {
        position: absolute;
        bottom: 72px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.65);
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.3s;
      }
      #prompt {
        position: absolute;
        top: 58%;
        left: 50%;
        transform: translateX(-50%);
        background: #005eb8;
        padding: 8px 18px;
        border-radius: 4px;
        font-size: 15px;
        opacity: 0;
        transition: opacity 0.15s;
        pointer-events: auto;
        cursor: pointer;
        border: none;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }
      #touch-ui {
        display: none;
      }
      body.touch #touch-ui {
        display: block;
      }
      /* filming mode (H): a completely clean frame for recording */
      body.filming #hud,
      body.filming.touch #touch-ui {
        display: none;
      }
      #joy {
        position: fixed;
        left: 26px;
        bottom: 30px;
        width: 124px;
        height: 124px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        border: 2px solid rgba(255, 255, 255, 0.35);
        touch-action: none;
        z-index: 15;
      }
      #joy-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 52px;
        height: 52px;
        margin: -26px 0 0 -26px;
        border-radius: 50%;
        background: rgba(0, 94, 184, 0.85);
        pointer-events: none;
      }
      #btns {
        position: fixed;
        right: 22px;
        bottom: 34px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 15;
      }
      #btns button {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: none;
        background: rgba(0, 94, 184, 0.85);
        color: #fff;
        font-size: 22px;
        touch-action: manipulation;
      }
      #reader {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 20, 40, 0.55);
        z-index: 22;
        font-family: Arial, Helvetica, sans-serif;
      }
      #reader .reader-panel {
        width: min(620px, 94vw);
        max-height: 82vh;
        overflow-y: auto;
        background: #f6f8f9;
        color: #16212a;
        border-radius: 6px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      }
      #reader header {
        position: sticky;
        top: 0;
        background: #005eb8;
        color: #fff;
        padding: 14px 18px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
      }
      #reader h2 {
        margin: 0;
        font-size: 22px;
      }
      #reader header .meta {
        font-size: 13px;
        opacity: 0.85;
      }
      #reader .reader-body {
        padding: 16px 20px 22px;
        font-size: 15px;
        line-height: 1.45;
      }
      #reader h3 {
        margin: 18px 0 6px;
        font-size: 15px;
        color: #005eb8;
      }
      #reader ul,
      #reader ol {
        margin: 4px 0;
        padding-left: 22px;
      }
      #reader .small {
        font-size: 12.5px;
        opacity: 0.7;
      }
      @media (max-width: 640px) {
        #area-sign {
          font-size: 15px;
          padding: 8px 12px;
          min-width: 0;
          max-width: 62vw;
        }
        #hint {
          display: none;
        }
      }
      #menu-root {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 20, 40, 0.55);
        z-index: 20;
        font-family: Arial, Helvetica, sans-serif;
      }
      .menu-panel {
        width: min(440px, 92vw);
        max-height: 76vh;
        display: flex;
        flex-direction: column;
        background: #f2f5f7;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      }
      .menu-head {
        background: #005eb8;
        color: #fff;
        padding: 14px 18px;
      }
      .menu-title {
        font-size: 20px;
        font-weight: bold;
      }
      .menu-sub {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 2px;
      }
      .menu-filter {
        margin: 10px 14px 0;
        padding: 9px 12px;
        font-size: 15px;
        border: 1px solid #aeb7bd;
        border-radius: 4px;
        outline: none;
      }
      .menu-list {
        overflow-y: auto;
        padding: 10px 14px 14px;
      }
      .menu-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 10px;
        margin-top: 4px;
        background: #fff;
        border-left: 5px solid #b9c4cb;
        border-radius: 3px;
        color: #16212a;
        font-size: 15px;
        cursor: pointer;
      }
      .menu-item.info {
        background: transparent;
        cursor: default;
        opacity: 0.75;
      }
      .menu-item.strong {
        font-weight: bold;
      }
      .menu-item.active {
        background: #005eb8;
        color: #fff;
      }
      .menu-item-sub {
        font-size: 12px;
        opacity: 0.7;
        white-space: nowrap;
      }
      .menu-foot {
        padding: 8px 14px 12px;
        font-size: 12px;
        color: #4d5a63;
      }
      #hint {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        opacity: 0.6;
      }
      #start {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: rgba(0, 30, 60, 0.85);
        color: #fff;
        cursor: pointer;
        z-index: 10;
      }
      #start h1 {
        font-size: 28px;
        margin: 0;
      }
      #start p {
        margin: 0;
        opacity: 0.8;
      }
      #start .badge {
        background: #005eb8;
        padding: 6px 14px;
        border-radius: 4px;
        font-size: 14px;
      }
      #fade {
        position: fixed;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="fade"></div>
    <div id="hud">
      <div id="area-sign">
        <div class="label">Loading…</div>
        <div class="room"></div>
      </div>
      <div id="crosshair"></div>
      <div id="toast"></div>
      <button id="prompt"></button>
      <div id="hint">WASD move · mouse look · E interact · click boards & the lecture screen · B back · F jump ahead · R read · M porter · H hide UI · Esc release cursor</div>
    </div>
    <div id="touch-ui">
      <div id="joy"><div id="joy-knob"></div></div>
      <div id="btns">
        <button id="btn-back" title="Back to your last stop" aria-label="Back">↩</button>
        <button id="btn-dash" title="Jump ahead" aria-label="Jump ahead">⏩</button>
        <button id="btn-read" title="Read this area" aria-label="Read this area">ℹ</button>
        <button id="btn-porter" title="Porter — search and travel" aria-label="Porter search">⌖</button>
      </div>
    </div>
    <div id="reader" role="dialog" aria-modal="true">
      <div class="reader-panel">
        <header>
          <h2></h2>
          <span class="meta"></span>
        </header>
        <div class="reader-body"></div>
      </div>
    </div>
    <div id="start">
      <h1>ContSys Hospital</h1>
      <p>A walkable model of the continuity-of-care concept system</p>
      <div class="badge">Click to enter</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
